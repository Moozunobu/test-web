<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>爆鳴気キャノン 簡易シミュレーター</title>
<style>
    body { font-family: sans-serif; background-color: #f4f4f9; color: #333; padding: 20px; }
    .container { max-width: 600px; margin: 0 auto; background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    h1 { font-size: 1.5rem; text-align: center; color: #d9534f; }
    label { display: block; margin-top: 15px; font-weight: bold; }
    input[type="number"] { width: 100%; padding: 8px; margin-top: 5px; box-sizing: border-box; }
    button { display: block; width: 100%; padding: 10px; margin-top: 20px; background-color: #5cb85c; color: white; border: none; border-radius: 4px; font-size: 1rem; cursor: pointer; }
    button:hover { background-color: #4cae4c; }
    .result-box { margin-top: 20px; padding: 15px; background-color: #eef; border-left: 5px solid #0056b3; }
    .warning { font-size: 0.85rem; color: #c9302c; margin-top: 15px; border: 1px solid #c9302c; padding: 10px; background-color: #fdf0ef; }
</style>
</head>
<body>

<div class="container">
    <h1>爆鳴気キャノン 簡易シミュレーター</h1>
    
    <label>容器の内径 (mm): <input type="number" id="diameter" value="10"></label>
    <label>容器の長さ (mm): <input type="number" id="length" value="25"></label>
    <label>爆鳴気の充填率 (%): <input type="number" id="ratio" value="66"></label>
    <label>玉（釘）の重さ (グラム): <input type="number" id="mass" value="0.1"></label>
    <label>エネルギー伝達効率 (%): <input type="number" id="efficiency" value="1" step="0.1"></label>
    <p style="font-size: 0.8rem; color: #666;">※自作の管の場合、ガス漏れや摩擦により玉に伝わるエネルギーは通常1%〜5%程度です。</p>

    <button onclick="calculate()">計算する</button>

    <div class="result-box" id="resultArea" style="display: none;">
        <h3>計算結果（理想気体モデル）</h3>
        <p>容器の総容積: <span id="resVolume"></span> cm³</p>
        <p>爆鳴気の体積: <span id="resGas"></span> cm³</p>
        <p>発生する総エネルギー: <span id="resEnergy"></span> ジュール</p>
        <p><strong>玉の推定初速: <span id="resVelocity"></span> m/s</strong></p>
        <p>理論上の最大圧力: 初期気圧の約 10〜15 倍 (約 1.0〜1.5 MPa)</p>
    </div>

    <div class="warning">
        <strong>【警告】</strong> この計算は理想的な物理条件に基づいた理論値です。現実には、この圧力が一瞬で発生するため、真鍮やプラスチックの容器は耐えきれずに破裂（爆発）し、致命的な事故に繋がる極めて高いリスクがあります。
    </div>
</div>

<script>
function calculate() {
    // 入力値の取得
    const d = parseFloat(document.getElementById('diameter').value);
    const l = parseFloat(document.getElementById('length').value);
    const ratio = parseFloat(document.getElementById('ratio').value) / 100;
    const m = parseFloat(document.getElementById('mass').value) / 1000; // kgに変換
    const eff = parseFloat(document.getElementById('efficiency').value) / 100;

    // 半径(cm)と長さ(cm)
    const r_cm = (d / 2) / 10;
    const l_cm = l / 10;

    // 体積 (cm3 = ml)
    const volume = Math.PI * Math.pow(r_cm, 2) * l_cm;
    const gasVolume = volume * ratio; // 爆鳴気の体積(ml)

    // 水素の物質量(mol)の計算
    // 爆鳴気は H2:O2 = 2:1 なので、体積の2/3が水素
    const h2Volume_L = (gasVolume * (2/3)) / 1000; // リットル換算
    const h2Moles = h2Volume_L / 22.4; // 標準状態でのモル数（概算）

    // 発生エネルギー (水素の燃焼熱は約 242 kJ/mol)
    const totalEnergy = h2Moles * 242000; // ジュール

    // 運動エネルギー K = 1/2 * m * v^2 より、v = sqrt(2 * K / m)
    // 実際に玉に伝わるエネルギー（効率を考慮）
    const kineticEnergy = totalEnergy * eff;
    
    // 初速の計算 (m/s)
    let velocity = 0;
    if (m > 0) {
        velocity = Math.sqrt((2 * kineticEnergy) / m);
    }

    // 結果の表示
    document.getElementById('resVolume').innerText = volume.toFixed(2);
    document.getElementById('resGas').innerText = gasVolume.toFixed(2);
    document.getElementById('resEnergy').innerText = totalEnergy.toFixed(2);
    document.getElementById('resVelocity').innerText = velocity.toFixed(1);
    
    document.getElementById('resultArea').style.display = 'block';
}
</script>

</body>
</html>
